# Forbes Water — nginx reverse proxy for the VPS.
#
# One public entry point in front of two loopback-only apps:
#   Next.js  → 127.0.0.1:3000   (the whole public site)
#   Strapi   → 127.0.0.1:1337   (admin + media only; the REST API is NOT exposed publicly)
#
# This is where the brief's rate-limiting lives. Every site read is server-side (Next → Strapi over
# loopback), so the only browser-reachable dynamic surface is the contact form Server Action, which
# Next serves as a POST to itself. We rate-limit that, the admin login, and general traffic.
#
# Replace forbeswater.com.au and the TLS paths with the real values.

# --- rate-limit zones (defined at http scope; include this file from nginx.conf's http{} block) ---
limit_req_zone  $binary_remote_addr  zone=general:10m  rate=30r/s;   # ordinary browsing
limit_req_zone  $binary_remote_addr  zone=forms:10m    rate=1r/s;    # contact form / mutations
limit_req_zone  $binary_remote_addr  zone=admin:10m    rate=5r/s;    # Strapi admin + login
limit_conn_zone $binary_remote_addr  zone=conns:10m;

# --- redirect http → https ---
server {
    listen 80;
    server_name forbeswater.com.au www.forbeswater.com.au;
    return 301 https://$host$request_uri;
}

# --- the public site ---
server {
    listen 443 ssl http2;
    server_name forbeswater.com.au www.forbeswater.com.au;

    ssl_certificate     /etc/letsencrypt/live/forbeswater.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forbeswater.com.au/privkey.pem;

    # security headers (the site is self-contained; tighten CSP once analytics/fonts are finalised)
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 2m;               # matches Next's Server Action body cap
    limit_conn conns 20;

    # Next.js Server Actions and any POST → tight limit (this is the contact form path)
    location / {
        limit_req zone=general burst=60 nodelay;
        # a POST here is a Server Action; the burst=3 keeps form flooding down without hurting reads
        limit_req zone=forms   burst=3;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Next static assets — no rate limit, long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Strapi-hosted media (editable images). Served through here so the CMS origin stays private.
    location /uploads/ {
        limit_req zone=general burst=60 nodelay;
        proxy_pass http://127.0.0.1:1337;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }
}

# --- Strapi admin on its own subdomain, locked down ---
server {
    listen 443 ssl http2;
    server_name cms.forbeswater.com.au;

    ssl_certificate     /etc/letsencrypt/live/cms.forbeswater.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cms.forbeswater.com.au/privkey.pem;

    client_max_body_size 50m;              # media uploads in the admin

    # Lock the admin to the office/VPN. Add real IPs; deny everyone else.
    # allow 203.0.113.0/24;   # office
    # deny  all;

    location / {
        limit_req zone=admin burst=10 nodelay;
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # The public REST API must NOT be reachable from the internet — the frontend reads it over
    # loopback with a token. Block it at the edge as defence in depth.
    location /api/ {
        deny all;
    }
}
